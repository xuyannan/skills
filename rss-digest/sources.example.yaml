# ============================================
# RSS Digest - 信息源配置文件示例
# ============================================
# 复制此文件为 sources.yaml 并根据需要修改
# cp sources.example.yaml sources.yaml

# RSS 信息源列表
sources:
  - name: "Hacker News - 最新"
    url: "https://hnrss.org/newest?count=20"
    type: rss

  - name: "TechCrunch"
    url: "https://techcrunch.com/feed/"
    type: rss

  - name: "阮一峰的网络日志"
    url: "https://www.ruanyifeng.com/blog/atom.xml"
    type: rss

  # 取消注释以添加更多信息源
  # - name: "The Verge"
  #   url: "https://www.theverge.com/rss/index.xml"
  #   type: rss

# ============================================
# AI 模型配置
# ============================================
# 支持所有 OpenAI 兼容 API，包括 Gemini、DeepSeek、OpenAI 等
# API Key 优先级：命令行参数 > 环境变量 OPENAI_API_KEY > 配置文件

# --- Google Gemini（推荐，通过 OpenAI 兼容端点）---
ai:
  model: gemini-2.0-flash                          # 可选: gemini-2.5-pro, gemini-2.0-flash, gemini-2.0-flash-lite
  apiKey: YOUR_GEMINI_API_KEY                       # 从 https://aistudio.google.com/apikey 获取
  baseUrl: https://generativelanguage.googleapis.com/v1beta/openai  # Gemini OpenAI 兼容端点

# --- OpenAI ---
# ai:
#   model: gpt-4o-mini                              # 可选: gpt-4o, gpt-4o-mini, gpt-4-turbo
#   apiKey: sk-your-openai-api-key                  # 或使用环境变量 OPENAI_API_KEY
#   baseUrl: https://api.openai.com/v1

# --- DeepSeek ---
# ai:
#   model: deepseek-chat                            # 可选: deepseek-chat, deepseek-reasoner
#   apiKey: sk-your-deepseek-api-key
#   baseUrl: https://api.deepseek.com/v1

# --- 其他 OpenAI 兼容 API ---
# ai:
#   model: your-model-name
#   apiKey: your-api-key
#   baseUrl: https://your-custom-endpoint/v1

# 通用设置
settings:
  hours: 24                           # 时间范围：最近 N 小时
  concurrency: 3                      # 并发抓取数量
  format: markdown                    # 输出格式：markdown / json
  timeout: 30000                      # 页面抓取超时（毫秒）
  fetchStrategy: auto                 # 抓取策略：auto / builtin / agent-browser
  # auto: 先用内置方式，失败后标记供 Agent 降级处理
  # builtin: 仅用内置方式
  # agent-browser: 全部由 Agent Browser 处理（需 OpenClaw 环境）
